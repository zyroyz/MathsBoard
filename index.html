<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MathBoard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --h:56px;--accent:#2563eb;--accent-l:#eff6ff;--danger:#ef4444;
  --text:#1a1a2e;--muted:#6b7280;--border:rgba(0,0,0,0.08);
  --ui:rgba(255,255,255,0.94);--r:12px;--rs:8px;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:#fff;touch-action:none;user-select:none;-webkit-user-select:none}

#toolbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--h);background:var(--ui);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,0.06);display:flex;align-items:center;gap:4px;padding:0 12px}
.tb-logo{font-family:'DM Mono',monospace;font-weight:500;font-size:15px;color:var(--text);padding:0 10px 0 4px;border-right:1px solid var(--border);margin-right:4px;white-space:nowrap}
.tb-logo span{color:var(--accent)}
.tb-sep{width:1px;height:28px;background:var(--border);margin:0 4px;flex-shrink:0}
.tb-btn{width:38px;height:38px;border-radius:var(--rs);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;position:relative;flex-shrink:0}
.tb-btn:hover{background:#f3f4f6;color:var(--text)}
.tb-btn.active{background:var(--accent-l);color:var(--accent)}
.tb-btn svg{pointer-events:none}
.tb-btn[title]:hover::after{content:attr(title);position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;font-size:11px;font-weight:500;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;font-family:'DM Sans',sans-serif}
.tb-size-wrap{display:flex;align-items:center;gap:8px;padding:0 10px;background:#f9fafb;border:1px solid var(--border);border-radius:var(--rs);height:38px;flex-shrink:0}
.size-dot{background:#0a0a0a;border-radius:50%;flex-shrink:0;transition:all .1s}
#penSize{-webkit-appearance:none;appearance:none;width:80px;height:4px;background:#e5e7eb;border-radius:2px;outline:none;cursor:pointer}
#penSize::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px rgba(37,99,235,0.15)}
.tb-zoom{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--muted);padding:4px 10px;background:#f9fafb;border:1px solid var(--border);border-radius:var(--rs);min-width:52px;text-align:center;cursor:pointer;transition:all .15s;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-zoom:hover{background:var(--accent-l);color:var(--accent)}
.tb-spacer{flex:1}
.tb-import-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
#importUrl{width:220px;height:38px;border:1px solid var(--border);border-radius:var(--rs);padding:0 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:#f9fafb;outline:none;transition:all .15s}
#importUrl:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
#importUrl::placeholder{color:#9ca3af}
#importBtn{height:38px;padding:0 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
#importBtn:hover{background:#1d4ed8}
#importBtn:disabled{opacity:.5;cursor:not-allowed}

#canvasWrap{position:fixed;top:var(--h);left:0;right:0;bottom:0;overflow:hidden;touch-action:none;z-index:1;cursor:crosshair}
#canvasWrap.mode-pan{cursor:grab}
#canvasWrap.mode-pan.panning{cursor:grabbing}
#canvasWrap.mode-eraser{cursor:cell}
#gridCanvas,#drawCanvas{position:absolute;top:0;left:0;pointer-events:none}
#hitCanvas{position:absolute;top:0;left:0;pointer-events:all;opacity:0;cursor:inherit}

#qbPanel{position:fixed;right:0;top:var(--h);bottom:0;width:340px;z-index:900;background:var(--ui);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-left:1px solid var(--border);box-shadow:-4px 0 24px rgba(0,0,0,0.06);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(0.4,0,0.2,1)}
#qbPanel.open{transform:translateX(0)}
.qb-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.qb-title{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.qb-count{background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px}
.qb-close{width:28px;height:28px;border:none;background:#f3f4f6;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.qb-close:hover{background:#fee2e2;color:var(--danger)}
.qb-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px 20px;color:var(--muted);font-size:14px;text-align:center}
.qb-empty svg{opacity:.3}
.qb-list{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.qb-list::-webkit-scrollbar{width:4px}
.qb-list::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}
.qb-source{background:#f9fafb;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.qb-source-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.qb-source-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.qb-source-meta{font-size:11px;color:var(--muted)}
.qb-questions{padding:0 8px 8px;display:flex;flex-direction:column;gap:6px}
.qb-q-item{background:#fff;border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.qb-q-preview{font-size:12px;color:var(--muted);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;flex:1}
.qb-q-add{flex-shrink:0;width:26px;height:26px;background:var(--accent-l);color:var(--accent);border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;transition:all .15s}
.qb-q-add:hover{background:var(--accent);color:#fff}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.2);transition:transform .3s cubic-bezier(0.4,0,0.2,1);z-index:5000;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#loadingOverlay{position:fixed;inset:0;z-index:4000;background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loadingOverlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;font-weight:500;color:var(--muted)}
</style>
</head>
<body>

<div id="toolbar">
  <div class="tb-logo">Math<span>Board</span></div>
  <button class="tb-btn active" id="toolPen" title="Pen (P)" onclick="setTool('pen')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
  </button>
  <button class="tb-btn" id="toolEraser" title="Eraser (E)" onclick="setTool('eraser')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6 18l6-6"/></svg>
  </button>
  <button class="tb-btn" id="toolPan" title="Pan (Space)" onclick="setTool('pan')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
  </button>
  <div class="tb-sep"></div>
  <div class="tb-size-wrap">
    <div class="size-dot" id="sizeDot" style="width:4px;height:4px"></div>
    <input type="range" id="penSize" min="1" max="24" value="3" oninput="updatePenSize(this.value)">
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn" title="Undo (Ctrl+Z)" onclick="undo()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
  </button>
  <button class="tb-btn" title="Redo (Ctrl+Y)" onclick="redo()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" title="Clear drawing" onclick="clearDrawing()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" title="Zoom in" onclick="zoomStep(1.25)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <div class="tb-zoom" id="zoomLabel" onclick="resetZoom()">100%</div>
  <button class="tb-btn" title="Zoom out" onclick="zoomStep(0.8)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <div class="tb-spacer"></div>
  <div class="tb-import-wrap">
    <input type="text" id="importUrl" placeholder="Paste PDF URL…">
    <button id="importBtn" onclick="importPDF()">Import PDF</button>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="qbToggleBtn" title="Question Bank" onclick="toggleQB()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="12" y1="7" x2="16" y2="7"/><line x1="12" y1="11" x2="16" y2="11"/><line x1="12" y1="15" x2="14" y2="15"/></svg>
  </button>
</div>

<div id="canvasWrap">
  <canvas id="gridCanvas"></canvas>
  <canvas id="drawCanvas"></canvas>
  <canvas id="hitCanvas"></canvas>
</div>

<div id="qbPanel">
  <div class="qb-header">
    <div class="qb-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Question Bank <span class="qb-count" id="qbCount">0</span>
    </div>
    <button class="qb-close" onclick="toggleQB()">✕</button>
  </div>
  <div id="qbEmpty" class="qb-empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <div>No questions yet.<br>Import a PDF to get started.</div>
  </div>
  <div class="qb-list" id="qbList" style="display:none"></div>
</div>

<div id="toast"></div>
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Loading…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const S={
  tool:'pen', penSize:3, zoom:1, panX:0, panY:0,
  drawing:false, currentStroke:null,
  strokes:[], undoStack:[], redoStack:[],
  questionBank:[], blocks:[], nextId:1,
  qbOpen:false,
  dragBlock:null, dragOX:0, dragOY:0,
  resizeBlock:null, resizeOW:0, resizeOX:0,
};

// ── PERSIST ──────────────────────────────────────────────────
function save(){
  try{
    localStorage.setItem('mb5',JSON.stringify({
      strokes:S.strokes, questionBank:S.questionBank,
      blocks:S.blocks.map(b=>({id:b.id,wx:b.wx,wy:b.wy,ww:b.ww,pageNum:b.pageNum,text:b.text,img:b.img,sourceName:b.sourceName,sourceId:b.sourceId,qId:b.qId})),
      nextId:S.nextId, panX:S.panX, panY:S.panY, zoom:S.zoom
    }));
  }catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('mb5')||'null');
    if(!d)return;
    if(d.strokes)S.strokes=d.strokes;
    if(d.questionBank)S.questionBank=d.questionBank;
    if(d.nextId)S.nextId=d.nextId;
    if(d.panX!=null)S.panX=d.panX;
    if(d.panY!=null)S.panY=d.panY;
    if(d.zoom!=null)S.zoom=d.zoom;
    if(d.blocks){
      for(const bd of d.blocks){
        const img=new Image();
        img.src=bd.img;
        S.blocks.push({...bd,imgEl:img,loaded:false});
        img.onload=()=>{S.blocks.find(b=>b.id===bd.id).loaded=true;redrawAll();};
      }
    }
  }catch(e){}
}

// ── CANVAS SETUP ─────────────────────────────────────────────
const wrap=document.getElementById('canvasWrap');
const gc=document.getElementById('gridCanvas');
const dc=document.getElementById('drawCanvas');
const hc=document.getElementById('hitCanvas');
const g=gc.getContext('2d');
const d=dc.getContext('2d');

function resize(){
  const W=wrap.offsetWidth,H=wrap.offsetHeight;
  gc.width=dc.width=hc.width=W;
  gc.height=dc.height=hc.height=H;
  drawGrid();redrawAll();
}
window.addEventListener('resize',resize);

// ── GRID ─────────────────────────────────────────────────────
function drawGrid(){
  const W=gc.width,H=gc.height;
  g.fillStyle='#fff';g.fillRect(0,0,W,H);
  const cell=40*S.zoom;
  const ox=((S.panX%cell)+cell)%cell, oy=((S.panY%cell)+cell)%cell;
  const bx=Math.floor(-S.panX/cell), by=Math.floor(-S.panY/cell);
  g.lineWidth=1;
  for(let i=-1;i*cell<W+cell;i++){
    g.strokeStyle=(bx+i)%5===0?'#c8cdd8':'#eaecf2';
    const x=ox+i*cell;g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke();
  }
  for(let i=-1;i*cell<H+cell;i++){
    g.strokeStyle=(by+i)%5===0?'#c8cdd8':'#eaecf2';
    const y=oy+i*cell;g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke();
  }
}

// ── COORD HELPERS ────────────────────────────────────────────
function s2w(sx,sy){return{x:(sx-S.panX)/S.zoom,y:(sy-S.panY)/S.zoom}}
function w2sx(wx){return wx*S.zoom+S.panX}
function w2sy(wy){return wy*S.zoom+S.panY}

// ── DRAW EVERYTHING ──────────────────────────────────────────
function redrawAll(){
  d.clearRect(0,0,dc.width,dc.height);
  // Draw blocks first (below ink)
  for(const b of S.blocks) drawBlock(b);
  // Draw ink strokes
  for(const s of S.strokes) renderStroke(s);
  // Draw active stroke
  if(S.currentStroke) renderStroke(S.currentStroke);
}

const HEADER_H=36; // world-independent px height of block header

function drawBlock(b){
  if(!b.loaded) return;
  const sx=w2sx(b.wx), sy=w2sy(b.wy);
  const sw=b.ww*S.zoom;
  const imgRatio=b.imgEl.naturalHeight/b.imgEl.naturalWidth;
  const sh=sw*imgRatio;
  const totalH=HEADER_H+sh+2; // 2px border padding

  d.save();
  // Shadow
  d.shadowColor='rgba(0,0,0,0.10)';d.shadowBlur=16;d.shadowOffsetY=4;

  // Card background
  d.fillStyle='#fff';
  roundRect(d,sx,sy,sw,totalH,12);
  d.fill();
  d.shadowColor='transparent';

  // Border
  d.strokeStyle='#e5e7eb';d.lineWidth=2;
  roundRect(d,sx,sy,sw,totalH,12);
  d.stroke();

  // Header bg
  d.fillStyle='#f8faff';
  roundRectTop(d,sx,sy,sw,HEADER_H,12);
  d.fill();

  // Header border bottom
  d.strokeStyle='#e5e7eb';d.lineWidth=1;
  d.beginPath();d.moveTo(sx,sy+HEADER_H);d.lineTo(sx+sw,sy+HEADER_H);d.stroke();

  // Header text
  d.fillStyle='#4b5563';d.font='600 12px DM Sans, sans-serif';
  d.textBaseline='middle';
  d.fillText(b.sourceName+' — Page '+b.pageNum, sx+14, sy+HEADER_H/2, sw-60);

  // Close button hint
  d.fillStyle='#d1d5db';
  d.beginPath();d.arc(sx+sw-18,sy+HEADER_H/2,7,0,Math.PI*2);d.fill();
  d.fillStyle='#6b7280';d.font='bold 11px sans-serif';d.textBaseline='middle';d.textAlign='center';
  d.fillText('×',sx+sw-18,sy+HEADER_H/2+0.5);
  d.textAlign='left';

  // Image
  d.drawImage(b.imgEl,sx+1,sy+HEADER_H,sw-2,sh);

  // Resize handle
  d.fillStyle='rgba(100,116,139,0.4)';
  d.beginPath();
  d.moveTo(sx+sw-4,sy+totalH-14);d.lineTo(sx+sw-4,sy+totalH-4);d.lineTo(sx+sw-14,sy+totalH-4);
  d.fill();

  d.restore();
}

function blockHitTest(b,sx,sy){
  if(!b.loaded)return null;
  const bsx=w2sx(b.wx), bsy=w2sy(b.wy);
  const sw=b.ww*S.zoom;
  const imgRatio=b.imgEl.naturalHeight/b.imgEl.naturalWidth;
  const sh=sw*imgRatio;
  const totalH=HEADER_H+sh+2;
  if(sx<bsx||sx>bsx+sw||sy<bsy||sy>bsy+totalH)return null;
  // Close button
  const cBtnX=bsx+sw-18, cBtnY=bsy+HEADER_H/2;
  if(Math.hypot(sx-cBtnX,sy-cBtnY)<10)return'close';
  // Resize handle
  if(sx>bsx+sw-18&&sy>bsy+totalH-18)return'resize';
  // Header drag
  if(sy<bsy+HEADER_H)return'drag';
  return null;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}
function roundRectTop(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── STROKE RENDERING ─────────────────────────────────────────
function renderStroke(s){
  if(!s.pts||s.pts.length<2)return;
  d.save();
  d.lineCap='round';d.lineJoin='round';
  if(s.tool==='eraser'){
    d.globalCompositeOperation='destination-out';
    d.strokeStyle='rgba(0,0,0,1)';
    d.lineWidth=s.size*S.zoom*4;
  }else{
    d.globalCompositeOperation='source-over';
    d.strokeStyle='#0a0a0a';
    d.lineWidth=s.size*S.zoom;
  }
  d.beginPath();
  const p0=s.pts[0];
  d.moveTo(w2sx(p0.x),w2sy(p0.y));
  if(s.pts.length===2){
    const p1=s.pts[1];d.lineTo(w2sx(p1.x),w2sy(p1.y));
  }else{
    for(let i=1;i<s.pts.length-1;i++){
      const a=s.pts[i],b=s.pts[i+1];
      const ax=w2sx(a.x),ay=w2sy(a.y),bx=w2sx(b.x),by=w2sy(b.y);
      d.quadraticCurveTo(ax,ay,(ax+bx)/2,(ay+by)/2);
    }
    const lp=s.pts[s.pts.length-1];
    d.lineTo(w2sx(lp.x),w2sy(lp.y));
  }
  d.stroke();d.restore();
}

// ── INPUT ────────────────────────────────────────────────────
let pid=null,isPan=false,plx=0,ply=0;
let pinchD0=null,pinchZ0=1,pmx=0,pmy=0;
let tDraw=false,tPan=false,tlx=0,tly=0;
let pointerMoved=false;

function cRect(){return hc.getBoundingClientRect()}

function hitBlockAt(sx,sy){
  // Test in reverse order (top block first)
  for(let i=S.blocks.length-1;i>=0;i--){
    const hit=blockHitTest(S.blocks[i],sx,sy);
    if(hit)return{block:S.blocks[i],hit};
  }
  return null;
}

hc.addEventListener('pointerdown',e=>{
  if(e.pointerType==='touch')return;
  e.preventDefault();
  hc.setPointerCapture(e.pointerId);
  pid=e.pointerId;
  pointerMoved=false;
  const r=cRect();
  const sx=e.clientX-r.left,sy=e.clientY-r.top;

  // Check block hit first (only drag/resize/close, not drawing on image area)
  const bh=hitBlockAt(sx,sy);
  if(bh){
    if(bh.hit==='close'){removeBlock(bh.block.id);return;}
    if(bh.hit==='drag'){
      S.dragBlock=bh.block;
      S.dragOX=sx/S.zoom-bh.block.wx;
      S.dragOY=sy/S.zoom-bh.block.wy;
      return;
    }
    if(bh.hit==='resize'){
      S.resizeBlock=bh.block;
      S.resizeOW=bh.block.ww;
      S.resizeOX=sx;
      return;
    }
    // Click inside image body — fall through to drawing
  }

  if(S.tool==='pan'){isPan=true;plx=sx;ply=sy;wrap.classList.add('panning');return;}
  startStroke(sx,sy);
});

hc.addEventListener('pointermove',e=>{
  if(e.pointerType==='touch'||e.pointerId!==pid)return;
  e.preventDefault();
  pointerMoved=true;
  const r=cRect();
  const sx=e.clientX-r.left,sy=e.clientY-r.top;

  if(S.dragBlock){
    S.dragBlock.wx=sx/S.zoom-S.dragOX;
    S.dragBlock.wy=sy/S.zoom-S.dragOY;
    redrawAll();return;
  }
  if(S.resizeBlock){
    const dw=(sx-S.resizeOX)/S.zoom;
    S.resizeBlock.ww=Math.max(200,S.resizeOW+dw);
    redrawAll();return;
  }
  if(isPan){doPan(sx-plx,sy-ply);plx=sx;ply=sy;return;}
  if(S.drawing&&S.currentStroke)addPoint(sx,sy);
});

hc.addEventListener('pointerup',e=>{
  if(e.pointerType==='touch')return;
  e.preventDefault();
  pid=null;
  if(S.dragBlock){S.dragBlock=null;save();return;}
  if(S.resizeBlock){S.resizeBlock=null;save();return;}
  if(isPan){isPan=false;wrap.classList.remove('panning');return;}
  endStroke();
});
hc.addEventListener('pointercancel',e=>{
  if(e.pointerType==='touch')return;
  pid=null;S.dragBlock=null;S.resizeBlock=null;isPan=false;wrap.classList.remove('panning');cancelStroke();
});

// ── TOUCH ────────────────────────────────────────────────────
hc.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    tDraw=false;tPan=false;S.dragBlock=null;S.resizeBlock=null;
    cancelStroke();
    const r=cRect();
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchD0=Math.sqrt(dx*dx+dy*dy);pinchZ0=S.zoom;
    pmx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
    pmy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    return;
  }
  if(e.touches.length===1){
    const r=cRect();
    const sx=e.touches[0].clientX-r.left,sy=e.touches[0].clientY-r.top;
    pointerMoved=false;

    const bh=hitBlockAt(sx,sy);
    if(bh){
      if(bh.hit==='close'){removeBlock(bh.block.id);return;}
      if(bh.hit==='drag'){
        S.dragBlock=bh.block;
        S.dragOX=sx/S.zoom-bh.block.wx;
        S.dragOY=sy/S.zoom-bh.block.wy;
        return;
      }
      if(bh.hit==='resize'){
        S.resizeBlock=bh.block;
        S.resizeOW=bh.block.ww;
        S.resizeOX=sx;
        return;
      }
    }

    if(S.tool==='pan'){tPan=true;tlx=sx;tly=sy;}
    else{tDraw=true;startStroke(sx,sy);}
  }
},{passive:false});

hc.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pinchD0!==null){
    const r=cRect();
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    const nz=Math.min(8,Math.max(0.1,pinchZ0*(dist/pinchD0)));
    const wx=(pmx-S.panX)/S.zoom,wy=(pmy-S.panY)/S.zoom;
    S.zoom=nz;S.panX=pmx-wx*S.zoom;S.panY=pmy-wy*S.zoom;
    doPan(mx-pmx,my-pmy);pmx=mx;pmy=my;
    return;
  }
  if(e.touches.length===1){
    pointerMoved=true;
    const r=cRect();
    const sx=e.touches[0].clientX-r.left,sy=e.touches[0].clientY-r.top;
    if(S.dragBlock){
      S.dragBlock.wx=sx/S.zoom-S.dragOX;
      S.dragBlock.wy=sy/S.zoom-S.dragOY;
      redrawAll();return;
    }
    if(S.resizeBlock){
      const dw=(sx-S.resizeOX)/S.zoom;
      S.resizeBlock.ww=Math.max(200,S.resizeOW+dw);
      redrawAll();return;
    }
    if(tPan){doPan(sx-tlx,sy-tly);tlx=sx;tly=sy;}
    else if(tDraw&&S.currentStroke)addPoint(sx,sy);
  }
},{passive:false});

hc.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.touches.length<2){
    if(pinchD0!==null){
      pinchD0=null;
      cancelStroke();
      tDraw=false;tPan=false;
      return;
    }
    pinchD0=null;
  }
  if(e.touches.length===0){
    if(S.dragBlock){S.dragBlock=null;save();return;}
    if(S.resizeBlock){S.resizeBlock=null;save();return;}
    tPan=false;
    if(tDraw){tDraw=false;endStroke();}
  }
},{passive:false});

hc.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cRect();
  const sx=e.clientX-r.left,sy=e.clientY-r.top;
  const f=e.deltaY>0?0.92:1.08;
  const wx=(sx-S.panX)/S.zoom,wy=(sy-S.panY)/S.zoom;
  S.zoom=Math.min(8,Math.max(0.1,S.zoom*f));
  S.panX=sx-wx*S.zoom;S.panY=sy-wy*S.zoom;
  drawGrid();redrawAll();updateZoom();
},{passive:false});

function doPan(dx,dy){
  S.panX+=dx;S.panY+=dy;
  drawGrid();redrawAll();
}

// ── STROKE OPS ───────────────────────────────────────────────
function startStroke(sx,sy){
  S.drawing=true;
  const wp=s2w(sx,sy);
  S.currentStroke={pts:[wp],size:S.penSize,tool:S.tool};
}
function addPoint(sx,sy){
  if(!S.currentStroke)return;
  S.currentStroke.pts.push(s2w(sx,sy));
  redrawAll();
}
function endStroke(){
  if(!S.drawing||!S.currentStroke){S.drawing=false;return;}
  if(S.currentStroke.pts.length===1){
    const p=S.currentStroke.pts[0];
    S.currentStroke.pts.push({x:p.x+0.01,y:p.y+0.01});
  }
  S.strokes.push(S.currentStroke);
  S.undoStack.push({type:'stroke',stroke:S.currentStroke});
  S.redoStack=[];
  S.currentStroke=null;S.drawing=false;
  redrawAll();save();
}
function cancelStroke(){
  S.currentStroke=null;S.drawing=false;tDraw=false;
  redrawAll();
}

// ── TOOLS ────────────────────────────────────────────────────
function setTool(t){
  S.tool=t;
  ['Pen','Eraser','Pan'].forEach(n=>document.getElementById('tool'+n).classList.remove('active'));
  document.getElementById('tool'+{pen:'Pen',eraser:'Eraser',pan:'Pan'}[t]).classList.add('active');
  wrap.className='';
  if(t==='pan')wrap.classList.add('mode-pan');
  if(t==='eraser')wrap.classList.add('mode-eraser');
}
function updatePenSize(v){
  S.penSize=parseInt(v);
  const s=Math.max(3,Math.min(20,S.penSize*1.8));
  const dot=document.getElementById('sizeDot');
  dot.style.width=s+'px';dot.style.height=s+'px';
}

// ── UNDO/REDO ────────────────────────────────────────────────
function undo(){
  const last=S.undoStack.pop();if(!last)return;
  S.redoStack.push(last);
  if(last.type==='stroke')S.strokes=S.strokes.filter(s=>s!==last.stroke);
  else if(last.type==='block')S.blocks=S.blocks.filter(b=>b!==last.block);
  redrawAll();save();
}
function redo(){
  const last=S.redoStack.pop();if(!last)return;
  S.undoStack.push(last);
  if(last.type==='stroke')S.strokes.push(last.stroke);
  else if(last.type==='block')S.blocks.push(last.block);
  redrawAll();save();
}
function clearDrawing(){
  if(!confirm('Clear all drawings?'))return;
  S.strokes=[];
  S.undoStack=S.undoStack.filter(u=>u.type!=='stroke');
  redrawAll();save();showToast('Drawing cleared');
}

// ── ZOOM ─────────────────────────────────────────────────────
function zoomStep(f){
  const cx=dc.width/2,cy=dc.height/2;
  const wx=(cx-S.panX)/S.zoom,wy=(cy-S.panY)/S.zoom;
  S.zoom=Math.min(8,Math.max(0.1,S.zoom*f));
  S.panX=cx-wx*S.zoom;S.panY=cy-wy*S.zoom;
  drawGrid();redrawAll();updateZoom();
}
function resetZoom(){S.zoom=1;S.panX=0;S.panY=0;drawGrid();redrawAll();updateZoom();}
function updateZoom(){document.getElementById('zoomLabel').textContent=Math.round(S.zoom*100)+'%';}

// ── PDF IMPORT ───────────────────────────────────────────────
async function importPDF(){
  const url=document.getElementById('importUrl').value.trim();
  if(!url){showToast('Please enter a PDF URL');return;}
  const btn=document.getElementById('importBtn');
  btn.disabled=true;showLoading('Loading PDF…');
  try{
    const proxy='https://corsproxy.io/?'+encodeURIComponent(url);
    const task=pdfjsLib.getDocument({url:proxy,cMapUrl:'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',cMapPacked:true});
    const pdf=await task.promise;
    const n=pdf.numPages;
    const srcName=decodeURIComponent(url.split('/').pop().replace(/\.pdf.*/i,''))||'PDF';
    const srcId='src_'+Date.now();
    const questions=[];
    for(let p=1;p<=n;p++){
      showLoading('Rendering page '+p+' / '+n+'…');
      const page=await pdf.getPage(p);
      const vp=page.getViewport({scale:1.8});
      const oc=document.createElement('canvas');
      oc.width=vp.width;oc.height=vp.height;
      const ox=oc.getContext('2d');
      ox.fillStyle='#fff';ox.fillRect(0,0,oc.width,oc.height);
      await page.render({canvasContext:ox,viewport:vp}).promise;
      const imgData=oc.toDataURL('image/jpeg',0.85);
      const tc=await page.getTextContent();
      const txt=tc.items.map(i=>i.str).join(' ').trim();
      questions.push({id:srcId+'_q'+p,pageNum:p,text:txt.slice(0,300)||'Page '+p,img:imgData});
    }
    const ei=S.questionBank.findIndex(s=>s.sourceName===srcName);
    if(ei>=0)S.questionBank.splice(ei,1);
    S.questionBank.push({sourceId:srcId,sourceName:srcName,url,questions});
    save();renderQB();
    document.getElementById('importUrl').value='';
    toggleQB(true);
    showToast('Imported '+n+' pages from '+srcName);
  }catch(err){
    console.error(err);showToast('Error loading PDF — check URL');
  }
  hideLoading();btn.disabled=false;
}

// ── QUESTION BANK ────────────────────────────────────────────
function toggleQB(force){
  S.qbOpen=force!==undefined?!!force:!S.qbOpen;
  document.getElementById('qbPanel').classList.toggle('open',S.qbOpen);
  document.getElementById('qbToggleBtn').classList.toggle('active',S.qbOpen);
}
function renderQB(){
  const list=document.getElementById('qbList');
  const empty=document.getElementById('qbEmpty');
  const total=S.questionBank.reduce((a,s)=>a+s.questions.length,0);
  document.getElementById('qbCount').textContent=total;
  if(!S.questionBank.length){empty.style.display='flex';list.style.display='none';return;}
  empty.style.display='none';list.style.display='flex';
  list.innerHTML='';
  for(const src of S.questionBank){
    const se=document.createElement('div');se.className='qb-source';
    const hdr=document.createElement('div');hdr.className='qb-source-header';
    hdr.innerHTML=`<div class="qb-source-name">${esc(src.sourceName)}</div><div class="qb-source-meta">${src.questions.length} pages</div>`;
    const qw=document.createElement('div');qw.className='qb-questions';
    for(const q of src.questions){
      const qe=document.createElement('div');qe.className='qb-q-item';
      qe.innerHTML=`<div class="qb-q-preview">Page ${q.pageNum}: ${esc(q.text.slice(0,100))}</div><button class="qb-q-add">+</button>`;
      qe.querySelector('.qb-q-add').onclick=ev=>{ev.stopPropagation();addBlock(q,src.sourceName,src.sourceId);};
      qw.appendChild(qe);
    }
    se.appendChild(hdr);se.appendChild(qw);list.appendChild(se);
  }
}

// ── BLOCKS ───────────────────────────────────────────────────
function addBlock(q,srcName,srcId){
  const cx=dc.width/2,cy=dc.height/2;
  const wx=(cx-S.panX)/S.zoom-200, wy=(cy-S.panY)/S.zoom-100;
  const img=new Image();
  img.src=q.img;
  const b={id:S.nextId++,wx,wy,ww:480,pageNum:q.pageNum,text:q.text,img:q.img,sourceName:srcName,sourceId:srcId,qId:q.id,imgEl:img,loaded:false};
  img.onload=()=>{b.loaded=true;redrawAll();};
  S.blocks.push(b);
  S.undoStack.push({type:'block',block:b});
  S.redoStack=[];
  save();showToast('Added page '+q.pageNum+' to whiteboard');
}

function removeBlock(id){
  S.blocks=S.blocks.filter(b=>b.id!==id);
  redrawAll();save();
}

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();}
  if(e.key==='p'||e.key==='P')setTool('pen');
  if(e.key==='e'||e.key==='E')setTool('eraser');
  if(e.key===' '){e.preventDefault();setTool('pan');}
});
document.addEventListener('keyup',e=>{
  if(e.key===' '&&S.tool==='pan')setTool('pen');
});

// ── TOAST / LOADING ──────────────────────────────────────────
let tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2800);
}
function showLoading(msg){document.getElementById('loadingText').textContent=msg||'Loading…';document.getElementById('loadingOverlay').classList.add('show');}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

hc.addEventListener('contextmenu',e=>e.preventDefault());

// ── INIT ─────────────────────────────────────────────────────
load();resize();renderQB();
updateZoom();updatePenSize(S.penSize);
document.getElementById('penSize').value=S.penSize;
showToast('MathBoard ready');
</script>
