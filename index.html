<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MathBoard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --toolbar-h: 56px;
    --bg: #ffffff;
    --grid-line: #e8eaf0;
    --grid-dark: #d0d4e0;
    --ink: #0a0a0a;
    --ui-bg: rgba(255,255,255,0.92);
    --ui-border: rgba(0,0,0,0.08);
    --ui-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --danger: #ef4444;
    --success: #10b981;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ─── TOOLBAR ─── */
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: var(--toolbar-h);
    background: var(--ui-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--ui-border);
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    display: flex; align-items: center; gap: 4px;
    padding: 0 12px;
  }

  .tb-logo {
    font-family: 'DM Mono', monospace;
    font-weight: 500; font-size: 15px;
    color: var(--text); letter-spacing: -0.3px;
    padding: 0 10px 0 4px;
    border-right: 1px solid var(--ui-border);
    margin-right: 4px;
    white-space: nowrap;
  }
  .tb-logo span { color: var(--accent); }

  .tb-sep { width: 1px; height: 28px; background: var(--ui-border); margin: 0 4px; }

  .tb-btn {
    width: 38px; height: 38px; border-radius: var(--radius-sm);
    border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.15s ease;
    position: relative; flex-shrink: 0;
  }
  .tb-btn:hover { background: #f3f4f6; color: var(--text); }
  .tb-btn.active { background: var(--accent-light); color: var(--accent); }
  .tb-btn svg { pointer-events: none; }

  .tb-btn[title]:hover::after {
    content: attr(title);
    position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: #1a1a2e; color: #fff; font-size: 11px; font-weight: 500;
    padding: 4px 8px; border-radius: 6px; white-space: nowrap; pointer-events: none;
    font-family: 'DM Sans', sans-serif; letter-spacing: 0;
  }

  /* Pen size slider */
  .tb-size-wrap {
    display: flex; align-items: center; gap: 8px;
    padding: 0 10px;
    background: #f9fafb;
    border: 1px solid var(--ui-border);
    border-radius: var(--radius-sm);
    height: 38px;
  }
  .size-dot { background: var(--ink); border-radius: 50%; flex-shrink: 0; transition: all 0.1s; }
  #penSize {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 4px; background: #e5e7eb; border-radius: 2px; outline: none; cursor: pointer;
  }
  #penSize::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
  }

  /* Zoom display */
  .tb-zoom {
    font-family: 'DM Mono', monospace;
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
    padding: 4px 10px;
    background: #f9fafb;
    border: 1px solid var(--ui-border);
    border-radius: var(--radius-sm);
    min-width: 52px; text-align: center;
    cursor: pointer; transition: all 0.15s;
    height: 38px; display: flex; align-items: center; justify-content: center;
  }
  .tb-zoom:hover { background: var(--accent-light); color: var(--accent); }

  .tb-spacer { flex: 1; }

  /* Import bar */
  .tb-import-wrap {
    display: flex; align-items: center; gap: 6px;
  }
  #importUrl {
    width: 240px; height: 38px;
    border: 1px solid var(--ui-border); border-radius: var(--radius-sm);
    padding: 0 12px; font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--text); background: #f9fafb; outline: none; transition: all 0.15s;
  }
  #importUrl:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  #importUrl::placeholder { color: #9ca3af; }
  #importBtn {
    height: 38px; padding: 0 14px;
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  #importBtn:hover { background: #1d4ed8; }
  #importBtn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ─── CANVAS ─── */
  #canvasWrap {
    position: fixed; top: var(--toolbar-h); left: 0; right: 0; bottom: 0;
    overflow: hidden; cursor: crosshair;
    touch-action: none;
  }
  #canvasWrap.panning { cursor: grab; }
  #canvasWrap.panning:active { cursor: grabbing; }

  #gridCanvas, #drawCanvas {
    position: absolute; top: 0; left: 0;
    pointer-events: none;
  }
  #drawCanvas { pointer-events: all; }

  /* ─── QUESTION BANK PANEL ─── */
  #qbPanel {
    position: fixed; right: 0; top: var(--toolbar-h); bottom: 0;
    width: 340px; z-index: 900;
    background: var(--ui-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid var(--ui-border);
    box-shadow: -4px 0 24px rgba(0,0,0,0.06);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  #qbPanel.open { transform: translateX(0); }

  .qb-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--ui-border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .qb-title {
    font-size: 15px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .qb-count {
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 600;
    padding: 2px 7px; border-radius: 10px;
  }
  .qb-close {
    width: 28px; height: 28px; border: none; background: #f3f4f6;
    border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.15s;
  }
  .qb-close:hover { background: #fee2e2; color: var(--danger); }

  .qb-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    padding: 40px 20px; color: var(--text-muted);
    font-size: 14px; text-align: center;
  }
  .qb-empty svg { opacity: 0.3; }

  .qb-list {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .qb-list::-webkit-scrollbar { width: 4px; }
  .qb-list::-webkit-scrollbar-track { background: transparent; }
  .qb-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

  .qb-source {
    background: #f9fafb;
    border: 1px solid var(--ui-border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .qb-source-header {
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: background 0.15s;
  }
  .qb-source-header:hover { background: #f3f4f6; }
  .qb-source-name {
    font-size: 12px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 200px;
  }
  .qb-source-meta { font-size: 11px; color: var(--text-muted); }
  .qb-questions { padding: 0 8px 8px; display: flex; flex-direction: column; gap: 6px; }

  .qb-q-item {
    background: #fff;
    border: 1px solid var(--ui-border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  }
  .qb-q-item:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
  .qb-q-preview {
    font-size: 12px; color: var(--text-muted); line-height: 1.5;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    flex: 1;
  }
  .qb-q-add {
    flex-shrink: 0; width: 26px; height: 26px;
    background: var(--accent-light); color: var(--accent);
    border: none; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; line-height: 1;
    transition: all 0.15s;
  }
  .qb-q-add:hover { background: var(--accent); color: #fff; }

  /* ─── WHITEBOARD BLOCKS ─── */
  .wb-block {
    position: absolute;
    background: #fff;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    overflow: hidden;
    cursor: move;
    min-width: 280px;
    transition: box-shadow 0.15s, border-color 0.15s;
    user-select: none;
  }
  .wb-block:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.12); border-color: #c7d2fe; }
  .wb-block-header {
    background: #f8faff;
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: move;
  }
  .wb-block-title { font-size: 12px; font-weight: 600; color: #4b5563; }
  .wb-block-close {
    width: 22px; height: 22px; border: none; background: transparent;
    cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center;
    color: #9ca3af; transition: all 0.15s; font-size: 14px; line-height: 1;
  }
  .wb-block-close:hover { background: #fee2e2; color: #ef4444; }
  .wb-block-body { padding: 14px 16px; }
  .wb-block-q-text { font-size: 13px; line-height: 1.6; color: #1a1a2e; white-space: pre-wrap; }
  .wb-block-img { max-width: 100%; border-radius: 6px; display: block; }
  .wb-block-resize {
    position: absolute; bottom: 4px; right: 4px; width: 16px; height: 16px;
    cursor: se-resize; opacity: 0.4;
  }
  .wb-block-resize:hover { opacity: 0.8; }

  /* ─── TOAST ─── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1a1a2e; color: #fff;
    padding: 10px 20px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 2000; pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── LOADING OVERLAY ─── */
  #loadingOverlay {
    position: fixed; inset: 0; z-index: 3000;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(8px);
    display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  #loadingOverlay.show { display: flex; }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid #e5e7eb;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; font-weight: 500; color: var(--text-muted); }

  /* ─── ERASE cursor ─── */
  #canvasWrap.eraser { cursor: cell; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="tb-logo">Math<span>Board</span></div>

  <!-- Drawing tools -->
  <button class="tb-btn active" id="toolPen" title="Pen (P)" onclick="setTool('pen')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
    </svg>
  </button>
  <button class="tb-btn" id="toolEraser" title="Eraser (E)" onclick="setTool('eraser')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6.0004 17.9996 17 7"/>
    </svg>
  </button>
  <button class="tb-btn" id="toolPan" title="Pan (Space)" onclick="setTool('pan')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Pen size -->
  <div class="tb-size-wrap">
    <div class="size-dot" id="sizeDot" style="width:4px;height:4px;"></div>
    <input type="range" id="penSize" min="1" max="24" value="3" oninput="updatePenSize(this.value)">
  </div>

  <div class="tb-sep"></div>

  <!-- Undo / Redo -->
  <button class="tb-btn" id="undoBtn" title="Undo (Ctrl+Z)" onclick="undo()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
    </svg>
  </button>
  <button class="tb-btn" id="redoBtn" title="Redo (Ctrl+Y)" onclick="redo()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Clear -->
  <button class="tb-btn" title="Clear drawing" onclick="clearDrawing()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Zoom -->
  <button class="tb-btn" title="Zoom in" onclick="zoomStep(1.25)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
  </button>
  <div class="tb-zoom" id="zoomLabel" title="Reset zoom" onclick="resetZoom()">100%</div>
  <button class="tb-btn" title="Zoom out" onclick="zoomStep(0.8)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
  </button>

  <div class="tb-spacer"></div>

  <!-- Import -->
  <div class="tb-import-wrap">
    <input type="text" id="importUrl" placeholder="Paste PDF link or URL…">
    <button id="importBtn" onclick="importPDF()">Import PDF</button>
  </div>

  <div class="tb-sep"></div>

  <!-- Question Bank -->
  <button class="tb-btn" id="qbToggleBtn" title="Question Bank" onclick="toggleQB()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      <line x1="12" y1="7" x2="16" y2="7"/><line x1="12" y1="11" x2="16" y2="11"/><line x1="12" y1="15" x2="14" y2="15"/>
    </svg>
  </button>
</div>

<!-- CANVAS AREA -->
<div id="canvasWrap">
  <canvas id="gridCanvas"></canvas>
  <canvas id="drawCanvas"></canvas>
</div>

<!-- WHITEBOARD BLOCKS LAYER -->
<div id="blocksLayer" style="position:fixed;top:56px;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;"></div>

<!-- QUESTION BANK PANEL -->
<div id="qbPanel">
  <div class="qb-header">
    <div class="qb-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Question Bank
      <span class="qb-count" id="qbCount">0</span>
    </div>
    <button class="qb-close" onclick="toggleQB()">✕</button>
  </div>
  <div id="qbContent">
    <div class="qb-empty" id="qbEmpty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <div>No questions yet.<br>Import a PDF to get started.</div>
    </div>
    <div class="qb-list" id="qbList" style="display:none;"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">Loading PDF…</div>
</div>

<!-- PDF.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const state = {
  tool: 'pen',       // pen | eraser | pan
  penSize: 3,
  zoom: 1,
  panX: 0,
  panY: 0,
  drawing: false,
  panning: false,
  lastPan: null,
  currentStroke: null,
  strokes: [],        // [{pts, size, tool}]
  undoStack: [],
  redoStack: [],
  questionBank: [],   // [{sourceId, sourceName, questions:[{id, text, img}]}]
  wbBlocks: [],       // [{id, x, y, w, qText, qImg, sourceId, qId}]
  nextBlockId: 1,
  qbOpen: false,
};

// Restore from localStorage
function saveState() {
  try {
    const data = {
      strokes: state.strokes,
      questionBank: state.questionBank,
      wbBlocks: state.wbBlocks,
      nextBlockId: state.nextBlockId,
      panX: state.panX,
      panY: state.panY,
      zoom: state.zoom,
    };
    localStorage.setItem('mathboard_v2', JSON.stringify(data));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('mathboard_v2');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.strokes) state.strokes = data.strokes;
    if (data.questionBank) state.questionBank = data.questionBank;
    if (data.wbBlocks) state.wbBlocks = data.wbBlocks;
    if (data.nextBlockId) state.nextBlockId = data.nextBlockId;
    if (data.panX !== undefined) state.panX = data.panX;
    if (data.panY !== undefined) state.panY = data.panY;
    if (data.zoom !== undefined) state.zoom = data.zoom;
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════════════
const wrap = document.getElementById('canvasWrap');
const gridCanvas = document.getElementById('gridCanvas');
const drawCanvas = document.getElementById('drawCanvas');
const gCtx = gridCanvas.getContext('2d');
const dCtx = drawCanvas.getContext('2d');

function resize() {
  const W = wrap.offsetWidth, H = wrap.offsetHeight;
  gridCanvas.width = drawCanvas.width = W;
  gridCanvas.height = drawCanvas.height = H;
  drawGrid();
  redrawAll();
}
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════
// GRID
// ═══════════════════════════════════════════════════════════
function drawGrid() {
  const W = gridCanvas.width, H = gridCanvas.height;
  gCtx.clearRect(0, 0, W, H);
  gCtx.fillStyle = '#ffffff';
  gCtx.fillRect(0, 0, W, H);

  const baseCell = 40;
  const cell = baseCell * state.zoom;
  const offX = ((state.panX % cell) + cell) % cell;
  const offY = ((state.panY % cell) + cell) % cell;

  const majorEvery = 5; // every 5 lines = major
  const baseLineX = Math.floor((-state.panX) / cell);
  const baseLineY = Math.floor((-state.panY) / cell);

  gCtx.lineWidth = 1;
  // Vertical
  for (let xi = -1; xi * cell < W + cell; xi++) {
    const x = offX + xi * cell;
    const lineIdx = baseLineX + xi;
    const isMajor = lineIdx % majorEvery === 0;
    gCtx.strokeStyle = isMajor ? '#c8cdd8' : '#eaecf2';
    gCtx.beginPath(); gCtx.moveTo(x, 0); gCtx.lineTo(x, H); gCtx.stroke();
  }
  // Horizontal
  for (let yi = -1; yi * cell < H + cell; yi++) {
    const y = offY + yi * cell;
    const lineIdx = baseLineY + yi;
    const isMajor = lineIdx % majorEvery === 0;
    gCtx.strokeStyle = isMajor ? '#c8cdd8' : '#eaecf2';
    gCtx.beginPath(); gCtx.moveTo(0, y); gCtx.lineTo(W, y); gCtx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════════════════════
function worldToScreen(wx, wy) {
  return { x: wx * state.zoom + state.panX, y: wy * state.zoom + state.panY };
}
function screenToWorld(sx, sy) {
  return { x: (sx - state.panX) / state.zoom, y: (sy - state.panY) / state.zoom };
}

function redrawAll() {
  const W = drawCanvas.width, H = drawCanvas.height;
  dCtx.clearRect(0, 0, W, H);
  for (const stroke of state.strokes) {
    drawStroke(stroke);
  }
}

function drawStroke(stroke) {
  if (!stroke.pts || stroke.pts.length < 2) return;
  const pts = stroke.pts;

  dCtx.save();
  dCtx.lineCap = 'round';
  dCtx.lineJoin = 'round';

  if (stroke.tool === 'eraser') {
    dCtx.globalCompositeOperation = 'destination-out';
    dCtx.strokeStyle = 'rgba(0,0,0,1)';
    dCtx.lineWidth = stroke.size * state.zoom * 4;
  } else {
    dCtx.globalCompositeOperation = 'source-over';
    dCtx.strokeStyle = '#0a0a0a';
    dCtx.lineWidth = stroke.size * state.zoom;
  }

  dCtx.beginPath();
  const p0 = worldToScreen(pts[0].x, pts[0].y);
  dCtx.moveTo(p0.x, p0.y);

  if (pts.length === 2) {
    const p1 = worldToScreen(pts[1].x, pts[1].y);
    dCtx.lineTo(p1.x, p1.y);
  } else {
    for (let i = 1; i < pts.length - 1; i++) {
      const a = worldToScreen(pts[i].x, pts[i].y);
      const b = worldToScreen(pts[i+1].x, pts[i+1].y);
      dCtx.quadraticCurveTo(a.x, a.y, (a.x + b.x) / 2, (a.y + b.y) / 2);
    }
    const last = worldToScreen(pts[pts.length-1].x, pts[pts.length-1].y);
    dCtx.lineTo(last.x, last.y);
  }
  dCtx.stroke();
  dCtx.restore();
}

// ═══════════════════════════════════════════════════════════
// POINTER EVENTS
// ═══════════════════════════════════════════════════════════
let activeTouches = {};
let pinchStartDist = null;
let pinchStartZoom = null;
let pinchMidStart = null;

function getEventPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function getTouchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function getTouchMid(e) {
  const rect = drawCanvas.getBoundingClientRect();
  return {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top
  };
}

drawCanvas.addEventListener('pointerdown', onPointerDown);
drawCanvas.addEventListener('pointermove', onPointerMove);
drawCanvas.addEventListener('pointerup', onPointerUp);
drawCanvas.addEventListener('pointercancel', onPointerUp);
drawCanvas.addEventListener('wheel', onWheel, { passive: false });

drawCanvas.addEventListener('touchstart', onTouchStart, { passive: false });
drawCanvas.addEventListener('touchmove', onTouchMove, { passive: false });
drawCanvas.addEventListener('touchend', onTouchEnd, { passive: false });

let activePointerId = null;

function onPointerDown(e) {
  // Only handle if not a touch event being handled by touch handlers
  if (e.pointerType === 'touch') return;
  e.preventDefault();
  drawCanvas.setPointerCapture(e.pointerId);
  activePointerId = e.pointerId;

  const pos = getEventPos(e);
  if (state.tool === 'pan') {
    state.panning = true;
    state.lastPan = pos;
    wrap.classList.add('panning');
    return;
  }
  startStroke(pos);
}

function onPointerMove(e) {
  if (e.pointerType === 'touch') return;
  if (e.pointerId !== activePointerId) return;
  e.preventDefault();
  const pos = getEventPos(e);
  if (state.panning && state.lastPan) {
    doPan(pos.x - state.lastPan.x, pos.y - state.lastPan.y);
    state.lastPan = pos;
    return;
  }
  if (state.drawing && state.currentStroke) {
    continueStroke(pos);
  }
}

function onPointerUp(e) {
  if (e.pointerType === 'touch') return;
  e.preventDefault();
  activePointerId = null;
  if (state.panning) {
    state.panning = false;
    state.lastPan = null;
    wrap.classList.remove('panning');
    return;
  }
  endStroke();
}

// Touch handling for pinch-zoom and stylus
let touchDrawing = false;
let touchPanning = false;
let lastTouchPan = null;

function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 2) {
    // Pinch zoom
    touchDrawing = false;
    touchPanning = false;
    if (state.drawing) { endStroke(); }
    pinchStartDist = getTouchDist(e);
    pinchStartZoom = state.zoom;
    pinchMidStart = getTouchMid(e);
    return;
  }
  if (e.touches.length === 1) {
    const pos = { x: e.touches[0].clientX - drawCanvas.getBoundingClientRect().left,
                  y: e.touches[0].clientY - drawCanvas.getBoundingClientRect().top };
    if (state.tool === 'pan') {
      touchPanning = true;
      lastTouchPan = pos;
    } else {
      touchDrawing = true;
      startStroke(pos);
    }
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 2 && pinchStartDist !== null) {
    const dist = getTouchDist(e);
    const mid = getTouchMid(e);
    const newZoom = Math.min(8, Math.max(0.1, pinchStartZoom * (dist / pinchStartDist)));
    // Zoom around midpoint
    const wx = (mid.x - state.panX) / state.zoom;
    const wy = (mid.y - state.panY) / state.zoom;
    state.zoom = newZoom;
    state.panX = mid.x - wx * state.zoom;
    state.panY = mid.y - wy * state.zoom;
    drawGrid(); redrawAll(); renderBlocks();
    updateZoomLabel();
    return;
  }
  if (e.touches.length === 1) {
    const pos = { x: e.touches[0].clientX - drawCanvas.getBoundingClientRect().left,
                  y: e.touches[0].clientY - drawCanvas.getBoundingClientRect().top };
    if (touchPanning && lastTouchPan) {
      doPan(pos.x - lastTouchPan.x, pos.y - lastTouchPan.y);
      lastTouchPan = pos;
    } else if (touchDrawing && state.currentStroke) {
      continueStroke(pos);
    }
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  if (e.touches.length < 2) { pinchStartDist = null; pinchMidStart = null; }
  if (e.touches.length === 0) {
    touchPanning = false; lastTouchPan = null;
    if (touchDrawing) { touchDrawing = false; endStroke(); }
  }
}

function onWheel(e) {
  e.preventDefault();
  const pos = getEventPos(e);
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  const wx = (pos.x - state.panX) / state.zoom;
  const wy = (pos.y - state.panY) / state.zoom;
  state.zoom = Math.min(8, Math.max(0.1, state.zoom * factor));
  state.panX = pos.x - wx * state.zoom;
  state.panY = pos.y - wy * state.zoom;
  drawGrid(); redrawAll(); renderBlocks();
  updateZoomLabel();
}

function doPan(dx, dy) {
  state.panX += dx; state.panY += dy;
  drawGrid(); redrawAll(); renderBlocks();
}

function startStroke(pos) {
  state.drawing = true;
  const wp = screenToWorld(pos.x, pos.y);
  state.currentStroke = { pts: [wp], size: state.penSize, tool: state.tool };
}

function continueStroke(pos) {
  if (!state.currentStroke) return;
  const wp = screenToWorld(pos.x, pos.y);
  const last = state.currentStroke.pts[state.currentStroke.pts.length - 1];
  // Always add point (quadratic smoothing handles curves)
  state.currentStroke.pts.push(wp);
  // Redraw only current stroke incrementally for performance
  redrawAll();
  drawStroke(state.currentStroke);
}

function endStroke() {
  if (!state.drawing || !state.currentStroke) { state.drawing = false; return; }
  if (state.currentStroke.pts.length >= 1) {
    // Ensure at least 2 pts for rendering
    if (state.currentStroke.pts.length === 1) {
      const p = state.currentStroke.pts[0];
      state.currentStroke.pts.push({x: p.x + 0.01, y: p.y + 0.01});
    }
    state.strokes.push(state.currentStroke);
    state.undoStack.push({ type: 'stroke', stroke: state.currentStroke });
    state.redoStack = [];
    saveState();
  }
  state.currentStroke = null;
  state.drawing = false;
  redrawAll();
}

// ═══════════════════════════════════════════════════════════
// TOOLS
// ═══════════════════════════════════════════════════════════
function setTool(t) {
  state.tool = t;
  document.querySelectorAll('.tb-btn[id^="tool"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tool' + t.charAt(0).toUpperCase() + t.slice(1));
  if (btn) btn.classList.add('active');
  wrap.classList.remove('panning', 'eraser');
  if (t === 'pan') wrap.classList.add('panning');
  if (t === 'eraser') wrap.classList.add('eraser');
}

function updatePenSize(v) {
  state.penSize = parseInt(v);
  const dot = document.getElementById('sizeDot');
  const s = Math.max(3, Math.min(20, state.penSize * 1.8));
  dot.style.width = s + 'px'; dot.style.height = s + 'px';
}
updatePenSize(3);

// ═══════════════════════════════════════════════════════════
// UNDO / REDO
// ═══════════════════════════════════════════════════════════
function undo() {
  const last = state.undoStack.pop();
  if (!last) return;
  state.redoStack.push(last);
  if (last.type === 'stroke') {
    state.strokes = state.strokes.filter(s => s !== last.stroke);
  } else if (last.type === 'block') {
    state.wbBlocks = state.wbBlocks.filter(b => b.id !== last.block.id);
    const el = document.getElementById('block-' + last.block.id);
    if (el) el.remove();
  }
  redrawAll(); saveState();
}

function redo() {
  const last = state.redoStack.pop();
  if (!last) return;
  state.undoStack.push(last);
  if (last.type === 'stroke') {
    state.strokes.push(last.stroke);
  } else if (last.type === 'block') {
    state.wbBlocks.push(last.block);
    createBlockElement(last.block);
  }
  redrawAll(); saveState();
}

function clearDrawing() {
  if (!confirm('Clear all drawings? (Question blocks will remain)')) return;
  state.strokes = [];
  state.undoStack = state.undoStack.filter(u => u.type !== 'stroke');
  redrawAll(); saveState();
  showToast('Drawing cleared');
}

// ═══════════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════════
function zoomStep(factor) {
  const cx = drawCanvas.width / 2, cy = drawCanvas.height / 2;
  const wx = (cx - state.panX) / state.zoom;
  const wy = (cy - state.panY) / state.zoom;
  state.zoom = Math.min(8, Math.max(0.1, state.zoom * factor));
  state.panX = cx - wx * state.zoom;
  state.panY = cy - wy * state.zoom;
  drawGrid(); redrawAll(); renderBlocks(); updateZoomLabel();
}

function resetZoom() {
  state.zoom = 1; state.panX = 0; state.panY = 0;
  drawGrid(); redrawAll(); renderBlocks(); updateZoomLabel();
}

function updateZoomLabel() {
  document.getElementById('zoomLabel').textContent = Math.round(state.zoom * 100) + '%';
}

// ═══════════════════════════════════════════════════════════
// PDF IMPORT
// ═══════════════════════════════════════════════════════════
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function importPDF() {
  const url = document.getElementById('importUrl').value.trim();
  if (!url) { showToast('Please enter a PDF URL'); return; }

  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  showLoading('Loading PDF…');

  // Use CORS proxy
  const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;

  try {
    const loadingTask = pdfjsLib.getDocument({ url: proxyUrl, cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/', cMapPacked: true });
    const pdf = await loadingTask.promise;
    const numPages = pdf.numPages;
    showLoading(`Extracting ${numPages} pages…`);

    const sourceName = url.split('/').pop().replace('.pdf','') || 'Imported PDF';
    const sourceId = 'src_' + Date.now();
    const questions = [];

    for (let p = 1; p <= numPages; p++) {
      showLoading(`Processing page ${p} of ${numPages}…`);
      const page = await pdf.getPage(p);

      // Render page to canvas for image
      const scale = 1.8;
      const viewport = page.getViewport({ scale });
      const offCanvas = document.createElement('canvas');
      offCanvas.width = viewport.width;
      offCanvas.height = viewport.height;
      const offCtx = offCanvas.getContext('2d');
      offCtx.fillStyle = '#fff'; offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
      await page.render({ canvasContext: offCtx, viewport }).promise;
      const imgData = offCanvas.toDataURL('image/png');

      // Extract text
      const textContent = await page.getTextContent();
      const text = textContent.items.map(i => i.str).join(' ').trim();

      questions.push({
        id: sourceId + '_q' + p,
        pageNum: p,
        text: text.slice(0, 300) || `Page ${p}`,
        img: imgData,
      });
    }

    // Save to question bank
    const existing = state.questionBank.findIndex(s => s.sourceName === sourceName);
    if (existing >= 0) state.questionBank.splice(existing, 1);
    state.questionBank.push({ sourceId, sourceName, url, questions });
    saveState();
    renderQB();
    hideLoading();
    document.getElementById('importUrl').value = '';
    toggleQB(true);
    showToast(`✓ Imported ${numPages} pages from ${sourceName}`);
  } catch(err) {
    hideLoading();
    console.error(err);
    showToast('Error loading PDF. Check URL & try again.');
  }
  btn.disabled = false;
}

// ═══════════════════════════════════════════════════════════
// QUESTION BANK UI
// ═══════════════════════════════════════════════════════════
function toggleQB(forceOpen) {
  state.qbOpen = forceOpen !== undefined ? forceOpen : !state.qbOpen;
  const panel = document.getElementById('qbPanel');
  panel.classList.toggle('open', state.qbOpen);
  document.getElementById('qbToggleBtn').classList.toggle('active', state.qbOpen);
}

function renderQB() {
  const list = document.getElementById('qbList');
  const empty = document.getElementById('qbEmpty');
  const count = document.getElementById('qbCount');

  const total = state.questionBank.reduce((a, s) => a + s.questions.length, 0);
  count.textContent = total;

  if (state.questionBank.length === 0) {
    empty.style.display = 'flex'; list.style.display = 'none'; return;
  }
  empty.style.display = 'none'; list.style.display = 'flex';

  list.innerHTML = '';
  for (const source of state.questionBank) {
    const srcEl = document.createElement('div');
    srcEl.className = 'qb-source';

    const hdr = document.createElement('div');
    hdr.className = 'qb-source-header';
    hdr.innerHTML = `<div class="qb-source-name">${escHtml(source.sourceName)}</div>
      <div class="qb-source-meta">${source.questions.length} pages</div>`;

    const qWrap = document.createElement('div');
    qWrap.className = 'qb-questions';

    for (const q of source.questions) {
      const qEl = document.createElement('div');
      qEl.className = 'qb-q-item';
      qEl.innerHTML = `
        <div class="qb-q-preview">Page ${q.pageNum}: ${escHtml(q.text.slice(0, 100))}…</div>
        <button class="qb-q-add" title="Add to whiteboard">+</button>`;
      qEl.querySelector('.qb-q-add').onclick = (ev) => {
        ev.stopPropagation();
        addBlockToWhiteboard(q, source.sourceName, source.sourceId);
      };
      qWrap.appendChild(qEl);
    }

    srcEl.appendChild(hdr); srcEl.appendChild(qWrap);
    list.appendChild(srcEl);
  }
}

// ═══════════════════════════════════════════════════════════
// WHITEBOARD BLOCKS
// ═══════════════════════════════════════════════════════════
function addBlockToWhiteboard(q, sourceName, sourceId) {
  // Place block in center of current view
  const cx = drawCanvas.width / 2, cy = drawCanvas.height / 2;
  const wx = (cx - state.panX) / state.zoom - 160;
  const wy = (cy - state.panY) / state.zoom - 100;

  const block = {
    id: state.nextBlockId++,
    wx, wy,
    w: 480, // world width
    qId: q.id,
    pageNum: q.pageNum,
    text: q.text,
    img: q.img,
    sourceName,
    sourceId,
  };
  state.wbBlocks.push(block);
  state.undoStack.push({ type: 'block', block });
  state.redoStack = [];
  createBlockElement(block);
  saveState();
  showToast(`Added page ${q.pageNum} to whiteboard`);
}

function createBlockElement(block) {
  const layer = document.getElementById('blocksLayer');
  const el = document.createElement('div');
  el.className = 'wb-block';
  el.id = 'block-' + block.id;
  el.style.pointerEvents = 'all';

  el.innerHTML = `
    <div class="wb-block-header">
      <div class="wb-block-title">${escHtml(block.sourceName)} — Page ${block.pageNum}</div>
      <button class="wb-block-close" onclick="removeBlock(${block.id})">✕</button>
    </div>
    <div class="wb-block-body">
      <img class="wb-block-img" src="${block.img}" draggable="false">
    </div>
    <svg class="wb-block-resize" viewBox="0 0 16 16" fill="#94a3b8">
      <path d="M12 4l-8 8M8 4l4 4-4-4zM4 8l4 4-4-4z" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M16 8 L8 16 M16 12 L12 16"/>
    </svg>`;

  layer.appendChild(el);
  updateBlockPos(el, block);
  makeBlockDraggable(el, block);
  makeBlockResizable(el, block);
}

function updateBlockPos(el, block) {
  // Convert world coords to screen coords
  const sx = block.wx * state.zoom + state.panX;
  const sy = block.wy * state.zoom + state.panY;
  const sw = block.w * state.zoom;
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  el.style.width = sw + 'px';
}

function renderBlocks() {
  for (const block of state.wbBlocks) {
    const el = document.getElementById('block-' + block.id);
    if (el) updateBlockPos(el, block);
  }
}

function removeBlock(id) {
  const block = state.wbBlocks.find(b => b.id === id);
  if (!block) return;
  state.wbBlocks = state.wbBlocks.filter(b => b.id !== id);
  state.undoStack.push({ type: 'removeBlock', block });
  const el = document.getElementById('block-' + id);
  if (el) el.remove();
  saveState();
}

function makeBlockDraggable(el, block) {
  let dragging = false, startSX, startSY, startWX, startWY;

  const header = el.querySelector('.wb-block-header');

  function onStart(e) {
    if (e.target.classList.contains('wb-block-close')) return;
    e.stopPropagation();
    dragging = true;
    const pos = e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
    startSX = pos.x; startSY = pos.y;
    startWX = block.wx; startWY = block.wy;
    el.style.zIndex = 100;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const pos = e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
    const dsx = pos.x - startSX, dsy = pos.y - startSY;
    block.wx = startWX + dsx / state.zoom;
    block.wy = startWY + dsy / state.zoom;
    updateBlockPos(el, block);
    saveState();
  }

  function onEnd() {
    dragging = false; el.style.zIndex = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
  }

  header.addEventListener('mousedown', onStart);
  header.addEventListener('touchstart', onStart, { passive: false });
}

function makeBlockResizable(el, block) {
  const handle = el.querySelector('.wb-block-resize');
  let resizing = false, startSX, startW;

  handle.addEventListener('mousedown', e => {
    e.stopPropagation(); resizing = true;
    startSX = e.clientX; startW = block.w;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
  });

  function onMove(e) {
    if (!resizing) return;
    const dsx = e.clientX - startSX;
    block.w = Math.max(200, startW + dsx / state.zoom);
    updateBlockPos(el, block);
    saveState();
  }
  function onEnd() {
    resizing = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
  }
}

// ═══════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
  if (e.key === 'p' || e.key === 'P') setTool('pen');
  if (e.key === 'e' || e.key === 'E') setTool('eraser');
  if (e.key === ' ') { e.preventDefault(); setTool('pan'); }
});
document.addEventListener('keyup', e => {
  if (e.key === ' ' && state.tool === 'pan') setTool('pen');
});

// ═══════════════════════════════════════════════════════════
// TOAST / LOADING
// ═══════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg || 'Loading…';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
loadState();
resize();
renderQB();

// Rebuild block elements from saved state
for (const block of state.wbBlocks) {
  createBlockElement(block);
}
updateZoomLabel();
updatePenSize(state.penSize);
document.getElementById('penSize').value = state.penSize;

// Prevent right-click context
drawCanvas.addEventListener('contextmenu', e => e.preventDefault());

showToast('Welcome to MathBoard ✦ Draw freely');
</script>
